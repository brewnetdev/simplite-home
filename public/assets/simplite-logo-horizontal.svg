<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 44" width="280" height="44">
  <defs>
    <linearGradient id="hPencilBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5B841"/>
      <stop offset="100%" stop-color="#E89B1C"/>
    </linearGradient>
    <linearGradient id="hNoteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F0EA"/>
    </linearGradient>
    <filter id="hShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.3"/>
      <feOffset dx="0.2" dy="0.4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 노트 아이콘 -->
  <g transform="translate(1, 4)" opacity="0.9">
    <rect x="0" y="0" width="13" height="17" fill="url(#hNoteGrad)" stroke="#1B5E3F" stroke-width="0.7" rx="1.2"/>
    <circle cx="3" cy="2.5" r="0.6" fill="#1B5E3F"/>
    <circle cx="6.5" cy="2.5" r="0.6" fill="#1B5E3F"/>
    <circle cx="10" cy="2.5" r="0.6" fill="#1B5E3F"/>
    <line x1="2.5" y1="6" x2="10.5" y2="6" stroke="#2A9D8F" stroke-width="0.5"/>
    <line x1="2.5" y1="8.5" x2="10.5" y2="8.5" stroke="#2A9D8F" stroke-width="0.5"/>
    <line x1="2.5" y1="11" x2="10.5" y2="11" stroke="#2A9D8F" stroke-width="0.5"/>
    <line x1="2.5" y1="13.5" x2="7" y2="13.5" stroke="#2A9D8F" stroke-width="0.5"/>
  </g>

  <!-- 테트리스 블록 로고 (S i m p l i t e) -->
  <g filter="url(#hShadow)" transform="translate(17, 2)">
    <!-- S -->
    <g fill="#1B5E3F">
      <rect x="0" y="0" width="17" height="6" rx="1"/>
      <rect x="0" y="6" width="6" height="7" rx="1"/>
      <rect x="0" y="13" width="17" height="6" rx="1"/>
      <rect x="11" y="19" width="6" height="7" rx="1"/>
      <rect x="0" y="26" width="17" height="6" rx="1"/>
    </g>
    <!-- i -->
    <rect x="20" y="0" width="6" height="6" rx="1" fill="#F5B841"/>
    <rect x="20" y="8" width="6" height="24" rx="1" fill="#2E8B57"/>
    <!-- m -->
    <g fill="#2A9D8F">
      <rect x="29" y="8" width="6" height="24" rx="1"/>
      <rect x="35" y="8" width="7" height="6" rx="1"/>
      <rect x="36" y="14" width="6" height="18" rx="1"/>
      <rect x="42" y="8" width="7" height="6" rx="1"/>
      <rect x="43" y="14" width="6" height="18" rx="1"/>
    </g>
    <!-- p -->
    <g fill="#52B788">
      <rect x="52" y="8" width="6" height="32" rx="1"/>
      <rect x="58" y="8" width="6" height="6" rx="1"/>
      <rect x="58" y="26" width="6" height="6" rx="1"/>
      <rect x="64" y="14" width="6" height="12" rx="1"/>
    </g>
    <!-- l -->
    <rect x="73" y="0" width="6" height="32" rx="1" fill="#1B5E3F"/>
    <!-- i -->
    <rect x="82" y="0" width="6" height="6" rx="1" fill="#F5B841"/>
    <rect x="82" y="8" width="6" height="24" rx="1" fill="#2E8B57"/>
    <!-- t -->
    <g fill="#264653">
      <rect x="94" y="0" width="6" height="32" rx="1"/>
      <rect x="91" y="6" width="12" height="5" rx="1"/>
    </g>
    <!-- e -->
    <g fill="#2A9D8F">
      <rect x="106" y="8" width="16" height="6" rx="1"/>
      <rect x="106" y="14" width="6" height="12" rx="1"/>
      <rect x="112" y="17" width="10" height="5" rx="1"/>
      <rect x="106" y="26" width="16" height="6" rx="1"/>
    </g>
  </g>

  <!-- 펜슬 아이콘 -->
  <g transform="translate(144, 0) rotate(25)" filter="url(#hShadow)">
    <rect x="0" y="0" width="5" height="3.5" fill="#E76F51" rx="0.6"/>
    <rect x="0" y="3.5" width="5" height="1.5" fill="#C9A961"/>
    <rect x="0" y="5" width="5" height="20" fill="url(#hPencilBody)"/>
    <rect x="0.4" y="5" width="1" height="20" fill="#FFFFFF" opacity="0.3"/>
    <polygon points="0,25 5,25 4.3,28 0.7,28" fill="#D4A574"/>
    <polygon points="0.7,28 4.3,28 2.5,31" fill="#2C1810"/>
  </g>

  <!-- 구분선 -->
  <line x1="162" y1="8" x2="162" y2="36" stroke="#52B788" stroke-width="1" opacity="0.4"/>

  <!-- WRITE SIMPLE -->
  <text x="172" y="19"
        font-family="'Helvetica Neue', 'Segoe UI', 'Arial', sans-serif"
        font-size="11"
        font-weight="700"
        fill="#1B5E3F"
        letter-spacing="2.5">WRITE SIMPLE</text>

  <!-- 텍스트 사이 구분선 + 골드 점 -->
  <line x1="172" y1="25" x2="210" y2="25" stroke="#52B788" stroke-width="0.5" opacity="0.6"/>
  <circle cx="216" cy="25" r="1.2" fill="#F5B841"/>
  <line x1="222" y1="25" x2="260" y2="25" stroke="#52B788" stroke-width="0.5" opacity="0.6"/>

  <!-- ACHIEVE MORE -->
  <text x="172" y="35"
        font-family="'Helvetica Neue', 'Segoe UI', 'Arial', sans-serif"
        font-size="9.5"
        font-weight="400"
        fill="#2A9D8F"
        letter-spacing="2.5">ACHIEVE MORE</text>
</svg>
