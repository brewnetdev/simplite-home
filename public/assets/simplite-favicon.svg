<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Simplite 파비콘: 테트리스 'S' 블록 + 펜슬 팁 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B5E3F"/>
      <stop offset="100%" stop-color="#0E3D28"/>
    </linearGradient>
  </defs>

  <!-- 배경: 둥근 사각형 딥 그린 -->
  <rect x="0" y="0" width="32" height="32" rx="6" fill="url(#bgGrad)"/>

  <!-- 테트리스 'S' 블록 (각 블록이 다른 톤으로 결합) -->
  <!-- 상단 블록들 -->
  <rect x="6"  y="6"  width="6" height="6" rx="0.8" fill="#52B788"/>
  <rect x="12" y="6"  width="6" height="6" rx="0.8" fill="#2A9D8F"/>
  <!-- 중앙 블록 -->
  <rect x="12" y="12" width="6" height="6" rx="0.8" fill="#F5B841"/>
  <!-- 하단 블록들 -->
  <rect x="12" y="18" width="6" height="6" rx="0.8" fill="#2E8B57"/>
  <rect x="18" y="18" width="6" height="6" rx="0.8" fill="#52B788"/>

  <!-- 블록 구분선 (테트리스 질감) -->
  <g stroke="#FFFFFF" stroke-width="0.3" opacity="0.3" fill="none">
    <line x1="12" y1="6"  x2="12" y2="12"/>
    <line x1="12" y1="18" x2="18" y2="18"/>
  </g>

  <!-- 중앙 블록의 펜슬 팁 강조 (하이라이트) -->
  <polygon points="15,14 17,14 16,16.5" fill="#2C1810" opacity="0.7"/>
</svg>
