<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 90" width="160" height="90">
  <!-- Simplite 로고 + 한글 서브카피 (높이 80→90으로 확장) -->
  <defs>
    <linearGradient id="pencilBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5B841"/>
      <stop offset="100%" stop-color="#E89B1C"/>
    </linearGradient>
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F0EA"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.3"/>
      <feOffset dx="0.2" dy="0.4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g transform="translate(2, 14)" opacity="0.9">
    <rect x="0" y="0" width="11" height="14" fill="url(#noteGrad)" stroke="#1B5E3F" stroke-width="0.6" rx="1"/>
    <circle cx="2.5" cy="2" r="0.5" fill="#1B5E3F"/>
    <circle cx="5.5" cy="2" r="0.5" fill="#1B5E3F"/>
    <circle cx="8.5" cy="2" r="0.5" fill="#1B5E3F"/>
    <line x1="2" y1="5"  x2="9" y2="5"  stroke="#2A9D8F" stroke-width="0.4"/>
    <line x1="2" y1="7"  x2="9" y2="7"  stroke="#2A9D8F" stroke-width="0.4"/>
    <line x1="2" y1="9"  x2="9" y2="9"  stroke="#2A9D8F" stroke-width="0.4"/>
    <line x1="2" y1="11" x2="6" y2="11" stroke="#2A9D8F" stroke-width="0.4"/>
  </g>

  <g filter="url(#softShadow)">
    <g fill="#1B5E3F">
      <rect x="16" y="10" width="14" height="5" rx="0.8"/>
      <rect x="16" y="15" width="5"  height="6" rx="0.8"/>
      <rect x="16" y="21" width="14" height="5" rx="0.8"/>
      <rect x="25" y="26" width="5"  height="6" rx="0.8"/>
      <rect x="16" y="32" width="14" height="5" rx="0.8"/>
    </g>
    <rect x="33" y="10" width="5" height="5"  rx="0.8" fill="#F5B841"/>
    <rect x="33" y="17" width="5" height="20" rx="0.8" fill="#2E8B57"/>
    <g fill="#2A9D8F">
      <rect x="41" y="17" width="5"  height="20" rx="0.8"/>
      <rect x="46" y="17" width="6"  height="5"  rx="0.8"/>
      <rect x="47" y="22" width="5"  height="15" rx="0.8"/>
      <rect x="52" y="17" width="6"  height="5"  rx="0.8"/>
      <rect x="53" y="22" width="5"  height="15" rx="0.8"/>
    </g>
    <g fill="#52B788">
      <rect x="61" y="17" width="5"  height="25" rx="0.8"/>
      <rect x="66" y="17" width="5"  height="5"  rx="0.8"/>
      <rect x="66" y="32" width="5"  height="5"  rx="0.8"/>
      <rect x="71" y="22" width="5"  height="10" rx="0.8"/>
    </g>
    <rect x="79" y="10" width="5" height="27" rx="0.8" fill="#1B5E3F"/>
    <rect x="87" y="10" width="5" height="5"  rx="0.8" fill="#F5B841"/>
    <rect x="87" y="17" width="5" height="20" rx="0.8" fill="#2E8B57"/>
    <g fill="#264653">
      <rect x="98"  y="10" width="5"  height="27" rx="0.8"/>
      <rect x="95"  y="15" width="11" height="4"  rx="0.8"/>
    </g>
    <g fill="#2A9D8F">
      <rect x="109" y="17" width="13" height="5" rx="0.8"/>
      <rect x="109" y="22" width="5"  height="10" rx="0.8"/>
      <rect x="114" y="24" width="8"  height="4" rx="0.8"/>
      <rect x="109" y="32" width="13" height="5" rx="0.8"/>
    </g>
  </g>

  <g transform="translate(140, 8) rotate(30)" filter="url(#softShadow)">
    <rect x="0" y="0" width="4" height="3" fill="#E76F51" rx="0.5"/>
    <rect x="0" y="3" width="4" height="1.2" fill="#C9A961"/>
    <rect x="0" y="4.2" width="4" height="18" fill="url(#pencilBody)"/>
    <rect x="0.3" y="4.2" width="0.8" height="18" fill="#FFFFFF" opacity="0.3"/>
    <polygon points="0,22.2 4,22.2 3.5,25 0.5,25" fill="#D4A574"/>
    <polygon points="0.5,25 3.5,25 2,27.5" fill="#2C1810"/>
  </g>

  <text x="80" y="54"
        text-anchor="middle"
        font-family="'Helvetica Neue', 'Segoe UI', 'Arial', sans-serif"
        font-size="6.5"
        font-weight="600"
        fill="#1B5E3F"
        letter-spacing="2.5">WRITE SIMPLE</text>

  <line x1="55" y1="60" x2="76" y2="60" stroke="#52B788" stroke-width="0.4" opacity="0.6"/>
  <circle cx="80" cy="60" r="0.9" fill="#F5B841"/>
  <line x1="84" y1="60" x2="105" y2="60" stroke="#52B788" stroke-width="0.4" opacity="0.6"/>

  <text x="80" y="70"
        text-anchor="middle"
        font-family="'Helvetica Neue', 'Segoe UI', 'Arial', sans-serif"
        font-size="5.5"
        font-weight="400"
        fill="#2A9D8F"
        letter-spacing="3">ACHIEVE  MORE</text>

  <!-- 한글 서브카피 -->
  <text x="80" y="83"
        text-anchor="middle"
        font-family="'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif"
        font-size="5"
        font-weight="500"
        fill="#1B5E3F"
        letter-spacing="0.5">쉬운 글쓰기 · 높은 성취</text>
</svg>
